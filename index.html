<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loquis — Link in bio</title>
  <style>
    :root {
      --loquis-green: #83dc90;
      --grid-gap: 4px;
      --page-max: 614px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: rgb(15, 18, 20);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #111;
    }

    .page {
      max-width: var(--page-max);
      margin: 0 auto;
      background: rgb(15, 18, 20);
      min-height: 100vh;
    }

    /* Header with centered Loquis logo */
    .header {
      background: rgb(15, 18, 20);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }

    .header .logo {
      height: 34px;
      width: auto;
      display: block;
      color: #fff; /* l'SVG usa currentColor */
    }

    /* Square grid — always 3 cards per row */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--grid-gap);
      padding: var(--grid-gap);
    }

    .card {
      position: relative;
      display: block;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #eee;
      text-decoration: none;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }

    .card:hover img {
      transform: scale(1.04);
    }

    /* Title overlay on hover */
    .card .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 8px;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 55%);
      color: #fff;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .card:hover .overlay {
      opacity: 1;
    }

    /* Riquadro placeholder per completare l'ultima riga */
    .card.placeholder {
      background: rgb(15, 18, 20);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      text-align: center;
    }

    .card.placeholder .ph-text {
      color: #fff;
      font-size: 19px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: 0.01em;
    }

    .card.placeholder .ph-logo {
      width: 55%;
      max-width: 110px;
      aspect-ratio: 585 / 403;
      height: auto;
      background-color: #fff;
      -webkit-mask: url("assets/images/loquis-square.svg") center / contain no-repeat;
      mask: url("assets/images/loquis-square.svg") center / contain no-repeat;
    }

    @media (max-width: 640px) {
      .card.placeholder { gap: 8px; padding: 8px; }
      .card.placeholder .ph-text { font-size: 14px; }
      .card.placeholder .ph-logo { width: 60%; max-width: 80px; }
    }

    /* Mobile: keep 3 per row, tighter 2px gap */
    @media (max-width: 640px) {
      :root { --grid-gap: 2px; }
      .header { padding: 22px 12px; }
      .header .logo { height: 30px; }
    }
  </style>
</head>

    <section class="grid" id="grid" aria-label="Contenuti"></section>
  </main>

  <script>
    async function render() {
      const grid = document.getElementById("grid");
      let data;
      try {
        const res = await fetch("mocked.json", { cache: "no-store" });
        data = await res.json();
      } catch (err) {
        grid.innerHTML = '<p style="padding:16px;grid-column:1/-1">Impossibile caricare mocked.json (serve un server locale).</p>';
        return;
      }

      const items = (data.result || []);
      const cards = items.map((it) => {
        const ch = it.channel || {};
        // immagine quadrata: il "picture" top-level è 360x360 (l'avatar canale è 16:9)
        const pic = it.picture || {};
        const img = pic.picture_360 || pic.picture_280 || pic.picture_720 || "";
        const link = ch.share_url || "#";
        const title = it.title || ch.name || "";
        return (
          '<a class="card" href="' + link + '" target="_blank" rel="noopener">' +
            '<img loading="lazy" src="' + img + '" alt="' + title.replace(/"/g, "&quot;") + '" />' +
            '<span class="overlay">' + title + '</span>' +
          '</a>'
        );
      });

      // Completa l'ultima riga: se il totale non è multiplo di 3,
      // aggiungi riquadri placeholder "continua ad ascoltare".
      const missing = (3 - (items.length % 3)) % 3;
      for (let i = 0; i < missing; i++) {
        cards.push(
          '<a class="card placeholder" href="https://www.loquis.com" target="_blank" rel="noopener">' +
            '<span class="ph-text">continua ad ascoltare su</span>' +
            '<span class="ph-logo" role="img" aria-label="Loquis"></span>' +
          '</a>'
        );
      }

      grid.innerHTML = cards.join("");
    }

    render();
  </script>
